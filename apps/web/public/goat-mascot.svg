<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGradLarge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5"/>
      <stop offset="100%" style="stop-color:#e5e5e5"/>
    </linearGradient>
    <linearGradient id="hornGradLarge" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8B4513"/>
      <stop offset="100%" style="stop-color:#D2691E"/>
    </linearGradient>
    <linearGradient id="jacketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3D2314"/>
      <stop offset="100%" style="stop-color:#5D3A1A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGradLarge)"/>
  
  <!-- 身体/深棕外套 -->
  <ellipse cx="100" cy="145" rx="45" ry="35" fill="url(#jacketGrad)" filter="url(#shadow)"/>
  
  <!-- 衣领 -->
  <path d="M70 125 Q100 140 130 125" fill="#f5f5f4" stroke="#d4d4d8" stroke-width="1"/>
  
  <!-- 头部 -->
  <ellipse cx="100" cy="85" rx="50" ry="55" fill="#f5f5f4" filter="url(#shadow)"/>
  
  <!-- 白色胡须 -->
  <ellipse cx="100" cy="125" rx="20" ry="15" fill="#ffffff"/>
  <path d="M85 120 Q80 135 75 145" fill="none" stroke="#e5e5e5" stroke-width="2"/>
  <path d="M90 122 Q85 138 82 148" fill="none" stroke="#e5e5e5" stroke-width="2"/>
  <path d="M115 120 Q120 135 125 145" fill="none" stroke="#e5e5e5" stroke-width="2"/>
  <path d="M110 122 Q115 138 118 148" fill="none" stroke="#e5e5e5" stroke-width="2"/>
  
  <!-- 耳朵 -->
  <ellipse cx="45" cy="80" rx="15" ry="20" fill="#f5f5f4" transform="rotate(-15 45 80)"/>
  <ellipse cx="45" cy="80" rx="10" ry="14" fill="#ffcccb" transform="rotate(-15 45 80)"/>
  <ellipse cx="155" cy="80" rx="15" ry="20" fill="#f5f5f4" transform="rotate(15 155 80)"/>
  <ellipse cx="155" cy="80" rx="10" ry="14" fill="#ffcccb" transform="rotate(15 155 80)"/>
  
  <!-- 棕色羊角 -->
  <path d="M55 55 Q35 15 60 5 Q70 15 62 50 Z" fill="url(#hornGradLarge)"/>
  <path d="M145 55 Q165 15 140 5 Q130 15 138 50 Z" fill="url(#hornGradLarge)"/>
  <!-- 羊角纹路 -->
  <path d="M52 45 Q45 35 55 25" fill="none" stroke="#A0522D" stroke-width="2"/>
  <path d="M55 40 Q50 30 58 22" fill="none" stroke="#A0522D" stroke-width="2"/>
  <path d="M148 45 Q155 35 145 25" fill="none" stroke="#A0522D" stroke-width="2"/>
  <path d="M145 40 Q150 30 142 22" fill="none" stroke="#A0522D" stroke-width="2"/>
  
  <!-- 眼睛 -->
  <ellipse cx="75" cy="75" rx="12" ry="14" fill="#4A3728"/>
  <ellipse cx="125" cy="75" rx="12" ry="14" fill="#4A3728"/>
  <circle cx="78" cy="71" r="5" fill="white"/>
  <circle cx="128" cy="71" r="5" fill="white"/>
  <circle cx="79" cy="70" r="2" fill="#1a1a1a"/>
  <circle cx="129" cy="70" r="2" fill="#1a1a1a"/>
  
  <!-- 腮红 -->
  <ellipse cx="55" cy="95" rx="12" ry="8" fill="#ffcccb" opacity="0.6"/>
  <ellipse cx="145" cy="95" rx="12" ry="8" fill="#ffcccb" opacity="0.6"/>
  
  <!-- 鼻子 -->
  <ellipse cx="100" cy="100" rx="10" ry="8" fill="#d4a574"/>
  <ellipse cx="96" cy="100" rx="3" ry="4" fill="#8B4513"/>
  <ellipse cx="104" cy="100" rx="3" ry="4" fill="#8B4513"/>
  
  <!-- 微笑 -->
  <path d="M90 110 Q100 118 110 110" fill="none" stroke="#8B4513" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 前蹄（蹲坐姿势） -->
  <ellipse cx="65" cy="160" rx="15" ry="12" fill="url(#jacketGrad)"/>
  <ellipse cx="135" cy="160" rx="15" ry="12" fill="url(#jacketGrad)"/>
</svg>
