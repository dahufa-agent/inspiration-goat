<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="hornGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)"/>
  <!-- 羊角 -->
  <path d="M28 35 Q20 20 30 10 Q35 15 32 30 Z" fill="url(#hornGrad)"/>
  <path d="M72 35 Q80 20 70 10 Q65 15 68 30 Z" fill="url(#hornGrad)"/>
  <!-- 脸部 -->
  <ellipse cx="50" cy="52" rx="28" ry="30" fill="#f5f5f4"/>
  <!-- 眼睛 -->
  <ellipse cx="38" cy="45" rx="5" ry="6" fill="#1f2937"/>
  <ellipse cx="62" cy="45" rx="5" ry="6" fill="#1f2937"/>
  <circle cx="40" cy="43" r="2" fill="white"/>
  <circle cx="64" cy="43" r="2" fill="white"/>
  <!-- 鼻子 -->
  <ellipse cx="50" cy="60" rx="8" ry="6" fill="#d4d4d8"/>
  <ellipse cx="47" cy="60" rx="2" ry="3" fill="#52525b"/>
  <ellipse cx="53" cy="60" rx="2" ry="3" fill="#52525b"/>
  <!-- 耳朵 -->
  <ellipse cx="22" cy="50" rx="8" ry="12" fill="#f5f5f4" transform="rotate(-20 22 50)"/>
  <ellipse cx="78" cy="50" rx="8" ry="12" fill="#f5f5f4" transform="rotate(20 78 50)"/>
  <!-- 眼镜 -->
  <circle cx="38" cy="45" r="12" fill="none" stroke="#667eea" stroke-width="2.5"/>
  <circle cx="62" cy="45" r="12" fill="none" stroke="#667eea" stroke-width="2.5"/>
  <line x1="50" y1="45" x2="50" y2="45" stroke="#667eea" stroke-width="2.5"/>
  <path d="M26 45 Q15 45 12 42" fill="none" stroke="#667eea" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M74 45 Q85 45 88 42" fill="none" stroke="#667eea" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 博士帽 -->
  <rect x="30" y="12" width="40" height="8" rx="2" fill="#1f2937"/>
  <rect x="35" y="4" width="30" height="10" rx="2" fill="#1f2937"/>
  <rect x="48" y="14" width="4" height="4" fill="#fbbf24"/>
</svg>
