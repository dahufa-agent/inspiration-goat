services:
  - type: web
    name: inspiration-goat-api
    env: node
    buildCommand: cd server && pnpm install && pnpm run build
    startCommand: cd server && node dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      # ⚠️ 请在 Render 控制台设置以下环境变量
      - key: COZE_SUPABASE_URL
        value: "${COZE_SUPABASE_URL}"
      - key: COZE_SUPABASE_ANON_KEY
        value: "${COZE_SUPABASE_ANON_KEY}"
