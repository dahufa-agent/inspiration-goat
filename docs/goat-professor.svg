<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGradLarge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="hornGradLarge" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGradLarge)"/>
  <!-- 羊角 -->
  <path d="M55 70 Q40 30 65 15 Q75 25 68 65 Z" fill="url(#hornGradLarge)"/>
  <path d="M145 70 Q160 30 135 15 Q125 25 132 65 Z" fill="url(#hornGradLarge)"/>
  <!-- 脸部 -->
  <ellipse cx="100" cy="105" rx="55" ry="60" fill="#f5f5f4" filter="url(#shadow)"/>
  <!-- 眼睛 -->
  <ellipse cx="75" cy="90" rx="10" ry="12" fill="#1f2937"/>
  <ellipse cx="125" cy="90" rx="10" ry="12" fill="#1f2937"/>
  <circle cx="78" cy="86" r="4" fill="white"/>
  <circle cx="128" cy="86" r="4" fill="white"/>
  <!-- 鼻子 -->
  <ellipse cx="100" cy="120" rx="16" ry="12" fill="#d4d4d8"/>
  <ellipse cx="93" cy="120" rx="4" ry="6" fill="#52525b"/>
  <ellipse cx="107" cy="120" rx="4" ry="6" fill="#52525b"/>
  <!-- 耳朵 -->
  <ellipse cx="42" cy="100" rx="15" ry="24" fill="#f5f5f4" transform="rotate(-15 42 100)"/>
  <ellipse cx="158" cy="100" rx="15" ry="24" fill="#f5f5f4" transform="rotate(15 158 100)"/>
  <!-- 眼镜 -->
  <circle cx="75" cy="90" r="24" fill="none" stroke="#667eea" stroke-width="4"/>
  <circle cx="125" cy="90" r="24" fill="none" stroke="#667eea" stroke-width="4"/>
  <line x1="99" y1="90" x2="101" y2="90" stroke="#667eea" stroke-width="4"/>
  <path d="M51 90 Q30 90 22 80" fill="none" stroke="#667eea" stroke-width="4" stroke-linecap="round"/>
  <path d="M149 90 Q170 90 178 80" fill="none" stroke="#667eea" stroke-width="4" stroke-linecap="round"/>
  <!-- 博士帽 -->
  <rect x="60" y="22" width="80" height="16" rx="4" fill="#1f2937"/>
  <rect x="70" y="6" width="60" height="20" rx="4" fill="#1f2937"/>
  <rect x="95" y="26" width="10" height="8" fill="#fbbf24"/>
  <!-- 帽子装饰线 -->
  <line x1="70" y1="12" x2="130" y2="12" stroke="#374151" stroke-width="2"/>
</svg>
