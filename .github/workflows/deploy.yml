name: Deploy to Zeabur

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zeabur CLI
        run: npm install -g zeabur

      - name: Deploy to Zeabur
        run: |
          # Note: In production, you should use secrets for authentication
          # zeabur auth login --token ${{ secrets.ZEABUR_TOKEN }}
          echo "GitHub Actions deployment triggered"
        env:
          NODE_ENV: production
