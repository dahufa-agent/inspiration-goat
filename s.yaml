# 灵感山羊APP - 阿里云函数计算部署指南

## 方案概述

使用阿里云函数计算部署后端服务：
- **新用户福利**: 3个月免费，每月15万CU额度
- **国内访问**: 阿里云国内节点，延迟低
- **免运维**: Serverless架构，无需管理服务器

## 部署步骤

### 第一步：准备工作

1. 注册阿里云账号（已有则跳过）
   - https://account.aliyun.com
   - 需要实名认证

2. 安装Serverless Devs工具（推荐）
   ```bash
   npm install -g @serverless-devs/s
   s config add --AccessKeyID your_access_key_id --AccessKeySecret your_access_key_secret
   ```

### 第二步：创建项目配置

在项目根目录创建`s.yaml`：

```yaml
edition: 1.0.0
name: inspiration-goat
access: default

services:
  api-server:
    component: fc
    actions:
      deploy:
        - run: npm install && npm run build
          path: ./
        - run: |
            rm -rf fc-deploy 2>/dev/null || true
            mkdir -p fc-deploy
            cp server/dist/index.js fc-deploy/
            cp -r server/node_modules fc-deploy/
            cp server/package.json fc-deploy/package.json
            cat > fc-deploy/bootstrap << 'EOF'
            #!/bin/bash
            cd /code/bootstrap
            node index.js
            EOF
            chmod +x fc-deploy/bootstrap
            cd fc-deploy && zip -r ../fc-deploy.zip . && cd ..
          path: ./
    
    props:
      region: cn-hangzhou
      service:
        name: inspiration-goat
        description: 灵感山羊APP后端服务
        internetAccess: true
      
      function:
        name: api-server
        description: API服务
        runtime: custom
        memorySize: 512
        timeout: 600
        caPort: 9091
        code: ./fc-deploy.zip
        bootstrap: ./bootstrap
        environmentVariables:
          NODE_ENV: production
          PORT: 9091
      
      triggers: []
      
      customDomains:
        - domain: api-inspiration-goat.fcapp.xyz
          protocol: HTTP
          routeConfigs:
            - path: /*
