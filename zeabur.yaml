services:
  - name: server
    type: web
    source:
      type: github
      repo: dahufa-agent/inspiration-goat
      branch: main
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && node dist/index.js
    env:
      NODE_ENV: production
      PORT: "5000"
    ports:
      - port: 5000
        expose: true
