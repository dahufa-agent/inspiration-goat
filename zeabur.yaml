version: "1"
services:
  - type: web
    name: inspiration-goat-server
    env: node
    region: singapore
    buildCommand: cd server && pnpm install && pnpm run build
    startCommand: cd /workspace/projects/server && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
