services:
  - name: server
    type: web
    source:
      type: github
      repo: dahufa-agent/inspiration-goat
      branch: main
    buildCommand: pnpm install && cd server && pnpm run build
    startCommand: cd server && pnpm start
    env:
      NODE_ENV: production
      NODE_VERSION: "18"
      PORT: "5000"
