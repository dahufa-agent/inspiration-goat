version: "1"
services:
  - type: web
    name: inspiration-goat-server
    env: node
    buildCommand: cd server && pnpm install && pnpm run build
    startCommand: node server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: COZE_WORKLOAD_IDENTITY_API_KEY
        fromService: 
          name: inspiration-goat-server
          envVarKey: COZE_WORKLOAD_IDENTITY_API_KEY
