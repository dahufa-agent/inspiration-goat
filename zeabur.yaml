version: "1"
services:
  - type: web
    name: inspiration-goat-server
    env: node
    region: singapore
    buildCommand: cd server && pnpm install && pnpm run build
    startCommand: cd server && pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      # Supabase 配置（请在 Zeabur 控制台设置）
      - key: COZE_SUPABASE_URL
        value: "${COZE_SUPABASE_URL}"
      - key: COZE_SUPABASE_ANON_KEY
        value: "${COZE_SUPABASE_ANON_KEY}"
      - key: COZE_SUPABASE_SERVICE_ROLE_KEY
        value: "${COZE_SUPABASE_SERVICE_ROLE_KEY}"
