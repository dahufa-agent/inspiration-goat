version: "1"
services:
  - type: web
    name: inspiration-goat-server
    env: node
    region: singapore
    buildCommand: cd server && pnpm install && pnpm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      # ⚠️ 重要：请在 Zeabur 控制台设置以下环境变量
      # COZE_SUPABASE_URL
      # COZE_SUPABASE_ANON_KEY
      # COZE_SUPABASE_SERVICE_ROLE_KEY
