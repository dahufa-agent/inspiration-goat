version: "1"
services:
  - type: web
    name: inspiration-goat-server
    env: node
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      # Supabase 配置 - 请在 Zeabur 控制台设置这些环境变量
      - key: COZE_SUPABASE_URL
        value: "${COZE_SUPABASE_URL}"
        # ⚠️ 请在 Zeabur 控制台设置此值，或联系管理员
        # 格式: https://xxx.supabase.co
      - key: COZE_SUPABASE_ANON_KEY
        value: "${COZE_SUPABASE_ANON_KEY}"
        # ⚠️ 请在 Zeabur 控制台设置此值，或联系管理员
        # 格式: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      - key: COZE_SUPABASE_SERVICE_ROLE_KEY
        value: "${COZE_SUPABASE_SERVICE_ROLE_KEY}"
        # ⚠️ 可选，用于服务端管理操作
